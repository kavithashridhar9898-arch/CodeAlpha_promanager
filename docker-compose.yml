version: '3.9'

services:
  # ─── MySQL Database ──────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: promanager_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-promanager}
      MYSQL_USER: ${DB_USER:-promanager}
      MYSQL_PASSWORD: ${DB_PASSWORD:-promanager123}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
      interval: 10s

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: promanager_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${DB_USER:-promanager}:${DB_PASSWORD:-promanager123}@db:3306/${DB_NAME:-promanager}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_32_chars_min}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_32_chars_min}
      PORT: 5000
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/public/uploads

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-v2
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:5000/api
    container_name: promanager_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api
    ports:
      - "3000:3000"

volumes:
  db_data:
  uploads:
